[build]
  publish = "public"
  command = "hugo --minify -b $URL"

[build.environment]
  HUGO_VERSION = "0.147.0"

[context.deploy-preview]
  command = "hugo --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --minify -b $DEPLOY_PRIME_URL"

[[redirects]]
  from = "/resources/curioss-patterns"
  to = "/patterns/"
  status = 301
  force = true

[[redirects]]
  from = "/resources/curioss-patterns/"
  to = "/patterns/"
  status = 301
  force = true
